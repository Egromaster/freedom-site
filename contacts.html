<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freedom — Поддержка</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page page--screen bg-purple">

  <nav class="nav">
    <a href="index.html" class="nav__logo"><img src="assets/logo-freedom.jpg" alt="Freedom"></a>
    <div class="nav__links">
      <a href="merch.html" class="nav__link">мерч</a>
      <a href="contacts.html" class="nav__link nav__link--active">поддержка</a>
    </div>
  </nav>

  <section class="section section--grow bg-purple">
    <div class="container--narrow">
      <h1 class="support-title">Поддержка</h1>
      <p class="support-subtitle">мы всегда на связи</p>

      <div class="contacts-grid">
        <div class="panel reveal">
          <h2 class="panel__title">Наши контакты</h2>
          <div class="info">
            <div class="info__label">Менеджер</div>
            <div class="info__value">+7 999 999 99 99</div>
          </div>
          <div class="info">
            <div class="info__label">Почта</div>
            <div class="info__value">hello@freedom.ru</div>
          </div>
          <div class="info info--accent">
            <div class="info__label">Время работы</div>
            <div class="info__value">Ежедневно 9:00 – 21:00</div>
          </div>
        </div>

        <div class="panel panel--form reveal">
          <h2 class="panel__title">Заполните заявку</h2>
          <form class="form" onsubmit="event.preventDefault(); alert('Заявка отправлена!'); this.reset();">
            <div class="form__row">
              <input class="field" type="text" placeholder="Имя" required>
              <input class="field" type="text" placeholder="Фамилия" required>
            </div>
            <input class="field" type="tel" placeholder="Телефон" required>
            <textarea class="field field--area" placeholder="Что случилось?"></textarea>
            <button class="form__submit" type="submit">Отправить</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="section bg-purple">
    <div class="container footer__brand">
      <img src="assets/logo-badge.jpg" alt="F" class="footer__badge">
      <div class="footer__name">Freedom</div>
    </div>
  </footer>

</div>
<script src="scripts/script.js" defer></script>
</body>
</html>
