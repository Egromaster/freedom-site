<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freedom — Мерч</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{font-family:'Comfortaa',sans-serif;color:#1f1f1f;background:#8b8bea}
  img{display:block;max-width:100%}
  a{text-decoration:none;color:inherit}
  @keyframes fdFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @media(max-width:640px){ [data-grid2]{grid-template-columns:1fr!important;max-width:420px;margin-left:auto;margin-right:auto} }
  @media(max-width:600px){
    [data-sec]{padding-left:18px!important;padding-right:18px!important}
    [data-nav]{padding-left:18px!important;padding-right:18px!important}
  }
</style>
</head>
<body>
<div style="background:#8b8bea;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column">

  <nav data-nav style="position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 40px;background:#d9d9d9;box-shadow:0 2px 14px rgba(40,40,80,.08)">
    <a href="index.html" style="display:flex;align-items:center">
      <img src="assets/logo-freedom.jpg" alt="Freedom" style="height:46px;width:auto">
    </a>
    <div style="display:flex;gap:12px">
      <a href="merch.html" style="background:#8cc88c;padding:10px 26px;border-radius:14px;font-size:15px;color:#244024;font-weight:600;transition:transform .15s,filter .15s" data-hover="filter:brightness(1.06);transform:translateY(-1px)">мерч</a>
      <a href="contacts.html" style="background:#a9a9ef;padding:10px 26px;border-radius:14px;font-size:15px;color:#33335f;transition:transform .15s,filter .15s" data-hover="filter:brightness(1.06);transform:translateY(-1px)">поддержка</a>
    </div>
  </nav>

  <section data-sec style="flex:1;padding:56px 40px 72px">
    <div style="max-width:900px;margin:0 auto">
      <div style="text-align:center;margin-bottom:8px">
        <span style="display:inline-block;font-family:'Caveat',cursive;font-size:40px;font-weight:700;color:#1d1d3a;background:#e7e7ef;padding:6px 44px;border-radius:18px">Мерч</span>
      </div>
      <p style="text-align:center;font-size:16px;color:#2c2c52;margin:14px auto 46px;max-width:460px">Носи язык с собой — вещи Freedom для тех, кто учится с удовольствием.</p>

      <div data-grid2 style="display:grid;grid-template-columns:1fr 1fr;gap:34px 40px">

        <div data-reveal style="background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 22px rgba(40,40,80,.10);transition:transform .18s,box-shadow .18s" data-hover="transform:translateY(-4px);box-shadow:0 16px 34px rgba(40,40,80,.16)">
          <div style="height:280px;background:#f3f3f3"><img src="assets/merch-notebook.jpg" alt="Тетрадь" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="padding:20px 22px 22px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px">
              <span style="font-weight:700;font-size:19px;color:#1d1d3a">Тетрадь</span>
              <span style="background:#a9a9ef;color:#2c2c52;padding:7px 18px;border-radius:12px;font-size:14px;font-weight:600">500&nbsp;₽</span>
            </div>
            <a href="404.html" style="display:block;text-align:center;background:#f5a623;color:#1f1f1f;font-weight:700;padding:13px;border-radius:14px;font-size:15px;transition:filter .15s" data-hover="filter:brightness(1.05)">Купить</a>
          </div>
        </div>

        <div data-reveal style="background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 22px rgba(40,40,80,.10);transition:transform .18s,box-shadow .18s" data-hover="transform:translateY(-4px);box-shadow:0 16px 34px rgba(40,40,80,.16)">
          <div style="height:280px;background:#f3f3f3"><img src="assets/merch-mug.jpg" alt="Кружка" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="padding:20px 22px 22px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px">
              <span style="font-weight:700;font-size:19px;color:#1d1d3a">Кружка</span>
              <span style="background:#a9a9ef;color:#2c2c52;padding:7px 18px;border-radius:12px;font-size:14px;font-weight:600">600&nbsp;₽</span>
            </div>
            <a href="404.html" style="display:block;text-align:center;background:#f5a623;color:#1f1f1f;font-weight:700;padding:13px;border-radius:14px;font-size:15px;transition:filter .15s" data-hover="filter:brightness(1.05)">Купить</a>
          </div>
        </div>

        <div data-reveal style="background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 22px rgba(40,40,80,.10);transition:transform .18s,box-shadow .18s" data-hover="transform:translateY(-4px);box-shadow:0 16px 34px rgba(40,40,80,.16)">
          <div style="height:280px;background:#eeeeee"><img src="assets/merch-tshirt.jpg" alt="Футболка" style="width:100%;height:100%;object-fit:cover;object-position:center 22%"></div>
          <div style="padding:20px 22px 22px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px">
              <span style="font-weight:700;font-size:19px;color:#1d1d3a">Футболка</span>
              <span style="background:#a9a9ef;color:#2c2c52;padding:7px 18px;border-radius:12px;font-size:14px;font-weight:600">1500&nbsp;₽</span>
            </div>
            <a href="404.html" style="display:block;text-align:center;background:#f5a623;color:#1f1f1f;font-weight:700;padding:13px;border-radius:14px;font-size:15px;transition:filter .15s" data-hover="filter:brightness(1.05)">Купить</a>
          </div>
        </div>

        <div data-reveal style="background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 22px rgba(40,40,80,.10);transition:transform .18s,box-shadow .18s" data-hover="transform:translateY(-4px);box-shadow:0 16px 34px rgba(40,40,80,.16)">
          <div style="height:280px;background:#f3f3f3"><img src="assets/merch-hoodie.jpg" alt="Худи" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="padding:20px 22px 22px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px">
              <span style="font-weight:700;font-size:19px;color:#1d1d3a">Худи</span>
              <span style="background:#a9a9ef;color:#2c2c52;padding:7px 18px;border-radius:12px;font-size:14px;font-weight:600">2990&nbsp;₽</span>
            </div>
            <a href="404.html" style="display:block;text-align:center;background:#f5a623;color:#1f1f1f;font-weight:700;padding:13px;border-radius:14px;font-size:15px;transition:filter .15s" data-hover="filter:brightness(1.05)">Купить</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer style="background:#8b8bea;padding:36px 40px 46px">
    <div style="max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px">
      <img src="assets/logo-badge.jpg" alt="F" style="width:70px;height:70px;border-radius:50%;box-shadow:0 10px 24px rgba(40,40,80,.18);animation:fdFloat 4.5s ease-in-out infinite">
      <div style="font-family:'Caveat',cursive;font-size:28px;color:#3f8f49;font-weight:700">Freedom</div>
    </div>
  </footer>

</div>
<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('[data-hover]').forEach(function(el){
    var x=el.getAttribute('data-hover'),b;
    el.addEventListener('mouseenter',function(){b=el.getAttribute('style')||'';el.setAttribute('style',b+';'+x);});
    el.addEventListener('mouseleave',function(){if(b!==undefined)el.setAttribute('style',b);});
  });
  document.querySelectorAll('[data-focus]').forEach(function(el){
    var x=el.getAttribute('data-focus'),b;
    el.addEventListener('focus',function(){b=el.getAttribute('style')||'';el.setAttribute('style',b+';'+x);});
    el.addEventListener('blur',function(){if(b!==undefined)el.setAttribute('style',b);});
  });
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var els=Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));
  if(reduce||!('IntersectionObserver'in window)||!els.length)return;
  var obs=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='none';obs.unobserve(e.target);}});},{threshold:0.12});
  requestAnimationFrame(function(){els.forEach(function(el,i){el.style.opacity='0';el.style.transform='translateY(26px)';el.style.transition='opacity .7s ease '+((i%3)*0.05)+'s, transform .7s ease '+((i%3)*0.05)+'s';obs.observe(el);});});
});
</script>
</body>
</html>
