<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freedom — Мерч</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page page--screen bg-purple">

  <nav class="nav">
    <a href="index.html" class="nav__logo"><img src="assets/logo-freedom.jpg" alt="Freedom"></a>
    <div class="nav__links">
      <a href="merch.html" class="nav__link nav__link--active">мерч</a>
      <a href="contacts.html" class="nav__link">поддержка</a>
    </div>
  </nav>

  <section class="section section--grow bg-purple">
    <div class="container--merch">
      <div class="merch-head"><span class="merch-title">Мерч</span></div>
      <p class="merch-subtitle">Носи язык с собой — вещи Freedom для тех, кто учится с удовольствием.</p>

      <div class="merch-grid">
        <div class="card reveal">
          <div class="card__media"><img src="assets/merch-notebook.jpg" alt="Тетрадь"></div>
          <div class="card__body">
            <div class="card__row"><span class="card__name">Тетрадь</span><span class="card__price">500&nbsp;₽</span></div>
            <a href="404.html" class="card__buy">Купить</a>
          </div>
        </div>

        <div class="card reveal">
          <div class="card__media"><img src="assets/merch-mug.jpg" alt="Кружка"></div>
          <div class="card__body">
            <div class="card__row"><span class="card__name">Кружка</span><span class="card__price">600&nbsp;₽</span></div>
            <a href="404.html" class="card__buy">Купить</a>
          </div>
        </div>

        <div class="card reveal">
          <div class="card__media card__media--tshirt"><img src="assets/merch-tshirt.jpg" alt="Футболка"></div>
          <div class="card__body">
            <div class="card__row"><span class="card__name">Футболка</span><span class="card__price">1500&nbsp;₽</span></div>
            <a href="404.html" class="card__buy">Купить</a>
          </div>
        </div>

        <div class="card reveal">
          <div class="card__media"><img src="assets/merch-hoodie.jpg" alt="Худи"></div>
          <div class="card__body">
            <div class="card__row"><span class="card__name">Худи</span><span class="card__price">2990&nbsp;₽</span></div>
            <a href="404.html" class="card__buy">Купить</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="section bg-purple">
    <div class="container footer__brand">
      <img src="assets/logo-badge.jpg" alt="F" class="footer__badge">
      <div class="footer__name">Freedom</div>
    </div>
  </footer>

</div>
<script src="scripts/script.js" defer></script>
</body>
</html>
